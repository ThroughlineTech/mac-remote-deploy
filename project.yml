name: RemoteDeploy
options:
  bundleIdPrefix: com.remotedeploy
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  RemoteDeployShared:
    path: Packages/RemoteDeployShared
  swift-nio:
    url: https://github.com/apple/swift-nio.git
    from: "2.65.0"
  swift-nio-ssl:
    url: https://github.com/apple/swift-nio-ssl.git
    from: "2.26.0"

targets:
  RemoteDeploy:
    type: application
    platform: macOS
    deploymentTarget:
      macOS: "14.0"
    sources:
      - path: RemoteDeploy
        excludes:
          - "Resources/pwa/**"
      - path: RemoteDeploy/Resources/pwa
        buildPhase: resources
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.remotedeploy.app
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.10"
        INFOPLIST_FILE: RemoteDeploy/Info.plist
        CODE_SIGN_ENTITLEMENTS: RemoteDeploy/RemoteDeploy.entitlements
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: RDJQ523WP4
        PRODUCT_NAME: RemoteDeploy
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
    dependencies:
      - package: RemoteDeployShared
        product: RemoteDeployShared
      - package: swift-nio
        product: NIO
      - package: swift-nio
        product: NIOHTTP1
      - package: swift-nio
        product: NIOFoundationCompat
      - package: swift-nio
        product: NIOWebSocket
      - package: swift-nio-ssl
        product: NIOSSL

  RemoteDeployCompanion:
    type: application
    platform: iOS
    deploymentTarget:
      iOS: "17.0"
    sources:
      - RemoteDeployCompanion
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.remotedeploy.companion
        DEVELOPMENT_TEAM: RDJQ523WP4
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        SWIFT_VERSION: "5.10"
        INFOPLIST_FILE: RemoteDeployCompanion/Info.plist
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSFaceIDUsageDescription: "RemoteDeploy uses Face ID to protect your paired Mac's authentication token."
        PRODUCT_NAME: RemoteDeployCompanion
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: RemoteDeployShared
        product: RemoteDeployShared

  RemoteDeployCompanionUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - RemoteDeployCompanionUITests
    dependencies:
      - target: RemoteDeployCompanion
    settings:
      base:
        SWIFT_VERSION: "5.10"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        GENERATE_INFOPLIST_FILE: "YES"

  RemoteDeployTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: RemoteDeployTests
        excludes:
          - "Fixtures/**"
    dependencies:
      - target: RemoteDeploy
    settings:
      base:
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: "YES"

  RemoteDeployIntegrationTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - RemoteDeployIntegrationTests
    dependencies:
      - target: RemoteDeploy
    settings:
      base:
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: "YES"
