<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Install {{APP_NAME}}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            text-align: center;
            padding: 60px 20px 40px;
            background: #f5f5f7;
            color: #1d1d1f;
            min-height: 100vh;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px 24px;
            max-width: 380px;
            margin: 0 auto;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .app-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .version {
            color: #86868b;
            font-size: 15px;
            margin-bottom: 4px;
        }
        .build-time {
            color: #86868b;
            font-size: 13px;
            margin-bottom: 32px;
        }
        .install-btn {
            display: inline-block;
            background: #007AFF;
            color: white;
            padding: 16px 40px;
            border-radius: 14px;
            text-decoration: none;
            font-size: 17px;
            font-weight: 600;
            transition: background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .install-btn:active {
            background: #0056CC;
        }
        .info {
            color: #86868b;
            margin-top: 24px;
            font-size: 13px;
            line-height: 1.5;
        }
        .footer {
            margin-top: 32px;
            color: #c7c7cc;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="app-icon">📦</div>
        <h1>{{APP_NAME}}</h1>
        <p class="version">Version {{VERSION}} ({{BUILD}})</p>
        <p class="build-time">Built {{BUILD_TIME}}</p>
        <a class="install-btn" href="itms-services://?action=download-manifest&url={{MANIFEST_URL}}">
            Install on This Device
        </a>
        <p class="info">
            Tap Install, then check your home screen.<br>
            You may need to trust the developer in<br>
            Settings → General → Device Management.
        </p>
    </div>
    <p class="footer">Served by RemoteDeploy</p>
</body>
</html>
